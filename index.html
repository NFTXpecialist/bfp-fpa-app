/* ══════════════════════════════════════════════════════════════
   BLANK RECORDS
══════════════════════════════════════════════════════════════ */
const bF1=()=>{const o={};OCC_NC.forEach(x=>{o[x.key]={nc:0,rn:0}});
  return{fsecAppReceived:0,fsecWithin:0,fsecNotWithin:0,totalFsec:0,nod:0,occupancy:o,
    overallNC:0,overallRN:0,overallTotal:0,inspectionUnderConstruction:0,
    fsicWithin:0,fsicNotWithin:0,totalFsicOccupancy:0,ntcNod:0};};
const bFx=()=>{const o={};OCC_FX.forEach(x=>{o[x.key]=0});
  return{newApps:0,renewalApps:0,totalApps:0,structural:0,occupancy:o,
    totalInspected:0,fsicNewWithin:0,fsicNewNotWithin:0,fsicRenewWithin:0,fsicRenewNotWithin:0,
    totalFsic:0,ntcNonCompliant:0,ntcCompliant:0,ntcvNonCompliant:0,ntcvCompliant:0,
    abatementNonCompliant:0,abatementCompliant:0,totalCompliant:0,closureOrder:0,
    closureFailAbatement:0,closureFailPay:0,totalClosure:0,

const bF5=()=>{const d={};F5_FEES.forEach(f=>{d[f.key]=0});return d;};

/* ══════════════════════════════════════════════════════════════
   FIREBASE HOOK
══════════════════════════════════════════════════════════════ */
function useFirebase(cfg){
  const [db,setDb]=useState(null);
  const [status,setStatus]=useState("disconnected"); // disconnected | connecting | connected | error
  const [records,setRecords]=useState([]);
  const unsubRef=useRef(null);

  useEffect(()=>{
    if(!cfg?.apiKey||!cfg?.projectId){setStatus("disconnected");return;}
    setStatus("connecting");
    try{
      // Delete existing app if reconfiguring
      const existing=firebase.apps.find(a=>a.name==="bfp");
      if(existing) existing.delete();

      const app=firebase.initializeApp({
        apiKey:cfg.apiKey,
        authDomain:`${cfg.projectId}.firebaseapp.com`,
        projectId:cfg.projectId,
      },"bfp");
      const firestore=firebase.firestore(app);
      setDb(firestore);

      // Real-time listener
      if(unsubRef.current) unsubRef.current();
      unsubRef.current=firestore.collection("fpa_reports")
        .orderBy("year").orderBy("month")
        .onSnapshot(snap=>{
          setStatus("connected");
          setRecords(snap.docs.map(d=>({id:d.id,...d.data()})));
        },err=>{setStatus("error");console.error(err);});
    }catch(e){setStatus("error");console.error(e);}
    return()=>{if(unsubRef.current)unsubRef.current();};
  },[cfg?.apiKey,cfg?.projectId]);

  const save=useCallback(async(year,month,data)=>{
    if(!db) throw new Error("Not connected");
    const id=`${year}_${String(month).padStart(2,"0")}`;
    await db.collection("fpa_reports").doc(id).set({year,month,...data,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
  },[db]);

  return{db,status,records,save};
}

/* ══════════════════════════════════════════════════════════════
   AGGREGATE HELPER
══════════════════════════════════════════════════════════════ */
function sumRecs(recs){
  if(!recs||!recs.length)return null;
  const m={f1:bF1(),f2:bFx(),f3:bFx(),f4:bFx(),f5:bF5()};
  recs.forEach(r=>{
    const f1keys=["fsecAppReceived","fsecWithin","fsecNotWithin","totalFsec","nod",
      "overallNC","overallRN","overallTotal","inspectionUnderConstruction",
      "fsicWithin","fsicNotWithin","totalFsicOccupancy","ntcNod"];
    f1keys.forEach(k=>{m.f1[k]+=(r.f1?.[k]||0);});
    OCC_NC.forEach(o=>{
      m.f1.occupancy[o.key].nc+=(r.f1?.occupancy?.[o.key]?.nc||0);
      m.f1.occupancy[o.key].rn+=(r.f1?.occupancy?.[o.key]?.rn||0);
    });
    const fxkeys=["newApps","renewalApps","totalApps","structural","totalInspected",
      "fsicNewWithin","fsicNewNotWithin","fsicRenewWithin","fsicRenewNotWithin","totalFsic",
      "ntcNonCompliant","ntcCompliant","ntcvNonCompliant","ntcvCompliant",
      "abatementNonCompliant","abatementCompliant","totalCompliant","closureOrder",
      "closureFailAbatement","closureFailPay","totalClosure",
      "overallInspected","overallCompliant","totalNonCompliant"];
    ["f2","f3","f4"].forEach(fn=>{
      fxkeys.forEach(k=>{m[fn][k]+=(r[fn]?.[k]||0);});
      OCC_FX.forEach(o=>{m[fn].occupancy[o.key]+=(r[fn]?.occupancy?.[o.key]||0);});
    });
    F5_FEES.forEach(f=>{m.f5[f.key]+=(r.f5?.[f.key]||0);});
  });
  return m;
}

/* ══════════════════════════════════════════════════════════════
   UI ATOMS
══════════════════════════════════════════════════════════════ */
function NumInput({value,onChange,small}){
  return <input type="number" min="0" value={value}
    onChange={e=>onChange(Number(e.target.value)||0)}
    onFocus={e=>e.target.style.borderColor=T.acc}
    onBlur={e=>e.target.style.borderColor=T.brd}
    style={{width:small?"58px":"76px",padding:"4px 5px",fontSize:"12px",
      background:T.bg,border:`1px solid ${T.brd}`,borderRadius:"5px",
      color:T.txt,textAlign:"center",fontFamily:"'JetBrains Mono',monospace",
      transition:"border-color .15s"}}/>;
}
function Card({children,style}){
  return <div style={{background:T.surf,border:`1px solid ${T.brd}`,
    borderRadius:"8px",marginBottom:"10px",overflow:"hidden",...style}}>{children}</div>;
}
function SHdr({children,color}){
  return <div style={{background:color||`linear-gradient(90deg,${T.accDk},${T.surf2})`,
    color:"white",padding:"9px 14px",fontFamily:"'JetBrains Mono',monospace",
    fontSize:"10px",fontWeight:"600",letterSpacing:"0.8px",textTransform:"uppercase",
    display:"flex",justifyContent:"space-between",alignItems:"center"}}>{children}</div>;
}
function FR({label,children}){
  return <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px",flexWrap:"wrap"}}>
    <span style={{fontSize:"11px",color:T.sub,minWidth:"190px",
      fontFamily:"'JetBrains Mono',monospace",lineHeight:"1.3"}}>{label}</span>
    {children}
  </div>;
}
const TH={padding:"6px 10px",fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",
  color:T.muted,fontWeight:"600",borderBottom:`1px solid ${T.brd}`,background:T.bg,textAlign:"left"};
const TD={padding:"5px 9px",fontFamily:"'JetBrains Mono',monospace",
  fontSize:"11px",color:T.txt,borderBottom:`1px solid ${T.surf2}`};
const TDC={...TD,textAlign:"center"};
function Badge({children,color}){
  return <span style={{background:color||T.accDk,color:"white",
    fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",
    padding:"2px 6px",borderRadius:"4px",whiteSpace:"nowrap"}}>{children}</span>;
}

          <span style={{fontSize:"10px",opacity:.7,fontWeight:400}}>₱{sub.toLocaleString()}</span>
        </SHdr>
        <div style={{padding:"8px 12px"}}>
          {fees.map(f=>(

                fontSize:"9px",padding:"2px 7px",borderRadius:"4px",
                whiteSpace:"nowrap",minWidth:"100px",textAlign:"center"}}>{f.code}</span>
              <span style={{flex:1,fontSize:"11px",color:T.sub}}>{f.label}</span>
              <NumInput value={data[f.key]||0} onChange={v=>u(f.key,v)}/>

          ))}
        </div>
      </Card>;
    })}
  </div>;
}

/* ══════════════════════════════════════════════════════════════
   CHART WRAPPER
══════════════════════════════════════════════════════════════ */
function ChartBox({type,data,opts,h}){
  const ref=useRef();const inst=useRef();
  useEffect(()=>{
    if(inst.current){inst.current.destroy();inst.current=null;}
    if(!ref.current||!data)return;
    inst.current=new Chart(ref.current,{type,data,
      options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},...opts}});
    return()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },[JSON.stringify(data)]);
  return <div style={{height:h||220,position:"relative"}}><canvas ref={ref}/></div>;
}

/* ══════════════════════════════════════════════════════════════
   ANALYTICS TAB
══════════════════════════════════════════════════════════════ */
function Analytics({records}){
  const [period,setPeriod]=useState("monthly");
  const [yr,setYr]=useState(new Date().getFullYear());

  const years=useMemo(()=>{
    const s=new Set(records.map(r=>r.year));
    s.add(new Date().getFullYear());
    return[...s].sort((a,b)=>a-b);
  },[records]);

  const yrRecs=useMemo(()=>records.filter(r=>r.year===yr),[records,yr]);

  function makeGroups(){
    if(period==="monthly") return MONTHS.map((mn,i)=>{
      const found=yrRecs.filter(r=>r.month===i+1);
      return{label:mn.slice(0,3),r:sumRecs(found)};
    });
    if(period==="quarterly") return[1,2,3,4].map(q=>({
      label:`Q${q} ${yr}`,
      r:sumRecs(yrRecs.filter(r=>Math.ceil(r.month/3)===q))
    }));
    if(period==="semester") return[
      {label:"Jan–Jun",r:sumRecs(yrRecs.filter(r=>r.month<=6))},
      {label:"Jul–Dec",r:sumRecs(yrRecs.filter(r=>r.month>6))},
    ];
    return[{label:String(yr),r:sumRecs(yrRecs)}];
  }
  const G=makeGroups();
  const L=G.map(g=>g.label);
  const getTotalFees=r=>r?F5_FEES.reduce((s,f)=>s+(r.f5?.[f.key]||0),0):0;

  // Dataset arrays
  const fsec=G.map(g=>g.r?.f1?.totalFsec||0);
  const fsic=G.map(g=>g.r?.f1?.totalFsicOccupancy||0);
  const bizInsp=G.map(g=>g.r?.f2?.overallInspected||0);
  const bizComp=G.map(g=>g.r?.f2?.overallCompliant||0);
  const bizNonC=G.map(g=>g.r?.f2?.totalNonCompliant||0);
  const feeTot=G.map(g=>getTotalFees(g.r));
  const fsifD=G.map(g=>(g.r?.f5?.fsifOccupancy||0)+(g.r?.f5?.fsifBusiness||0));
  const taxD=G.map(g=>["constructionTax","realtyTax","premiumTax","salesTax","proceedsTax"].reduce((s,k)=>s+(g.r?.f5?.[k]||0),0));
  const closures=G.map(g=>(g.r?.f2?.totalClosure||0)+(g.r?.f3?.totalClosure||0)+(g.r?.f4?.totalClosure||0));

  // Merged year totals
  const M=sumRecs(yrRecs)||bRec();
  const occNC=OCC_NC.map(o=>M.f1.occupancy[o.key].nc);
  const occRN=OCC_NC.map(o=>M.f1.occupancy[o.key].rn);
  const occBiz=OCC_FX.map(o=>M.f2.occupancy[o.key]||0);

  const totFsec=fsec.reduce((a,b)=>a+b,0);
  const totFsic=fsic.reduce((a,b)=>a+b,0);
  const totInsp=bizInsp.reduce((a,b)=>a+b,0);
  const totFees=feeTot.reduce((a,b)=>a+b,0);
  const totClose=closures.reduce((a,b)=>a+b,0);

  const kpis=[
    {icon:"📋",val:totFsec,label:"Total FSEC Issued",color:T.acc},
    {icon:"✅",val:totFsic,label:"Total FSIC (Occupancy)",color:T.grn},
    {icon:"🔍",val:totInsp,label:"Business Inspections",color:T.pur},
    {icon:"💰",val:`₱${totFees.toLocaleString()}`,label:"Total Fees Collected",color:T.amb},
    {icon:"🔒",val:totClose,label:"Total Closure Orders",color:T.red},
  ];

  return <div className="fade">
    {/* Controls */}
    <div style={{display:"flex",gap:"8px",marginBottom:"14px",flexWrap:"wrap",alignItems:"center"}}>
      <select value={yr} onChange={e=>setYr(Number(e.target.value))}
        style={{background:T.bg,border:`1px solid ${T.brd}`,color:T.txt,
          padding:"6px 10px",borderRadius:"6px",fontSize:"12px",fontFamily:"'JetBrains Mono',monospace"}}>
        {years.map(y=><option key={y} value={y}>{y}</option>)}
      </select>
      <div style={{display:"flex",gap:"3px",background:T.bg,
        border:`1px solid ${T.brd}`,borderRadius:"7px",padding:"3px"}}>
        {["monthly","quarterly","semester","annual"].map(p=>(
          <button key={p} onClick={()=>setPeriod(p)}
            style={{padding:"5px 12px",border:"none",borderRadius:"5px",cursor:"pointer",
              fontSize:"11px",fontFamily:"'JetBrains Mono',monospace",fontWeight:600,
              background:period===p?T.acc:"transparent",color:period===p?"white":T.sub,
              transition:"all .15s"}}>
            {p.charAt(0).toUpperCase()+p.slice(1)}
          </button>
        ))}
      </div>
      {!records.length&&<span style={{color:T.amb,fontSize:"11px",fontFamily:"'JetBrains Mono',monospace"}}>
        ⚠ No saved data yet — save monthly reports to populate analytics.

    </div>

    {/* KPI Strip */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"8px",marginBottom:"12px"}}>

        <div key={k.label} style={{background:T.surf,border:`1px solid ${T.brd}`,
          borderRadius:"8px",padding:"10px 12px",borderTop:`3px solid ${k.color}`}}>
          <div style={{fontSize:"16px",marginBottom:"4px"}}>{k.icon}</div>
          <div style={{color:k.color,fontFamily:"'JetBrains Mono',monospace",
            fontSize:"18px",fontWeight:800}}>{typeof k.val==="number"?k.val.toLocaleString():k.val}</div>
          <div style={{color:T.muted,fontSize:"9px",marginTop:"2px",lineHeight:"1.3"}}>{k.label}</div>

    </div>

    {/* Row 1: FSEC/FSIC + Compliance */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"10px"}}>
      <Card>
        <SHdr>FSEC & FSIC Issuances</SHdr>
        <div style={{padding:"12px"}}>
          <ChartBox type="bar" data={{labels:L,datasets:[
            {label:"FSEC Issued",data:fsec,backgroundColor:"rgba(59,130,246,.75)",borderColor:T.acc,borderWidth:1,borderRadius:3},
            {label:"FSIC Occupancy",data:fsic,backgroundColor:"rgba(16,185,129,.75)",borderColor:T.grn,borderWidth:1,borderRadius:3},
          ]}} opts={COPTS}/>
        </div>
      </Card>
      <Card>
        <SHdr>Business Inspections — Compliant vs Non-Compliant</SHdr>
        <div style={{padding:"12px"}}>
          <ChartBox type="bar" data={{labels:L,datasets:[
            {label:"Total Inspected",data:bizInsp,backgroundColor:"rgba(139,92,246,.6)",borderColor:T.pur,borderWidth:1,borderRadius:3},
            {label:"Compliant",data:bizComp,backgroundColor:"rgba(16,185,129,.75)",borderColor:T.grn,borderWidth:1,borderRadius:3},
            {label:"Non-Compliant",data:bizNonC,backgroundColor:"rgba(239,68,68,.65)",borderColor:T.red,borderWidth:1,borderRadius:3},
          ]}} opts={COPTS}/>

    {/* Row 2: Fee trend + Closures */}
    <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:"10px",marginBottom:"10px"}}>
      <Card>
        <SHdr>Fee Collection Trend</SHdr>
        <div style={{padding:"12px"}}>
          <ChartBox type="line" data={{labels:L,datasets:[
            {label:"Total Fees",data:feeTot,borderColor:T.amb,backgroundColor:"rgba(245,158,11,.12)",tension:.4,fill:true,pointRadius:4,pointHoverRadius:6},
            {label:"FSIF",data:fsifD,borderColor:T.acc,backgroundColor:"transparent",tension:.4,pointRadius:3},
            {label:"Fire Code Tax",data:taxD,borderColor:T.red,backgroundColor:"transparent",tension:.4,pointRadius:3},
          ]}} opts={COPTS}/>
        </div>
      </Card>
      <Card>
        <SHdr>Closure Orders</SHdr>
        <div style={{padding:"12px"}}>
          <ChartBox type="bar" data={{labels:L,datasets:[
            {label:"Closure Orders",data:closures,backgroundColor:"rgba(239,68,68,.7)",borderColor:T.red,borderWidth:1,borderRadius:3},
          ]}} opts={{...COPTS,plugins:{...COPTS.plugins,legend:{display:false}}}}/>

    {/* Row 3: Occupancy NC/RN + Business occupancy */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"10px"}}>
      <Card>
        <SHdr>New Construction — Occupancy NC vs RN ({yr} total)</SHdr>
        <div style={{padding:"12px"}}>
          <ChartBox type="bar" h={260} data={{
            labels:OCC_NC.map(o=>o.label),
            datasets:[
              {label:"NC (New)",data:occNC,backgroundColor:"rgba(59,130,246,.75)"},
              {label:"RN (Renovation)",data:occRN,backgroundColor:"rgba(139,92,246,.75)"},
            ]}} opts={COPTS_NY}/>
        </div>
      </Card>
      <Card>
        <SHdr>Business Inspections — By Occupancy Type ({yr} total)</SHdr>
        <div style={{padding:"12px"}}>
          <ChartBox type="bar" h={260} data={{
            labels:OCC_FX.map(o=>o.label),

    {/* Row 4: Fee doughnut + Monthly table */}
    <div style={{display:"grid",gridTemplateColumns:"220px 1fr",gap:"10px"}}>
      <Card>
        <SHdr>Fee Categories — {yr}</SHdr>
        <div style={{padding:"12px",height:"240px",display:"flex",justifyContent:"center"}}>
          <ChartBox type="doughnut" h={216} data={{
            labels:["Fire Code Tax","FSIF","Clearance","Installation","Other","COC"],
            datasets:[{
              data:[
                ["constructionTax","realtyTax","premiumTax","salesTax","proceedsTax"].reduce((s,k)=>s+(M.f5[k]||0),0),

                (M.f5.storageClearance||0)+(M.f5.conveyanceClearance||0),
                ["installBuildingService","installAFSS","installFDAS","installKHSS","installFlammable","installLPGas","otherInstall"].reduce((s,k)=>s+(M.f5[k]||0),0),
                F5_FEES.filter(f=>f.group==="Other Fees").reduce((s,f)=>s+(M.f5[f.key]||0),0),

              ))}

                <td style={{...TDC,color:r&&(r.f2?.totalNonCompliant||0)>0?T.red:T.muted}}>{r?.f2?.totalNonCompliant??D}</td>
                <td style={{...TDC,color:cl>0?T.red:T.muted}}>{cl??D}</td>
                <td style={{...TDC,color:fees?T.grn:T.muted}}>{fees!=null?`₱${fees.toLocaleString()}`:D}</td>
              </tr>;
            })}</tbody>

  </div>;

function FirebaseModal({saved,onSave,onClose}){
  const [apiKey,setApiKey]=useState(saved?.apiKey||"");
  const [projectId,setProjectId]=useState(saved?.projectId||"");
  const [st,setSt]=useState(null);
  const [busy,setBusy]=useState(false);

  async function test(){
    if(!apiKey||!projectId){setSt({e:true,t:"Fill both fields."});return;}
    setBusy(true);setSt(null);
    try{
      const url=`https://firestore.googleapis.com/v1/projects/${projectId}/databases/(default)/documents/fpa_reports?pageSize=1&key=${apiKey}`;
      const r=await fetch(url);
      if(r.status===200||r.status===404){setSt({e:false,t:"✅ Connected to Firebase project!"});}
      else if(r.status===403){setSt({e:true,t:"❌ Permission denied — enable Firestore and set rules (see below)."});}
      else{const t=await r.text();setSt({e:true,t:`❌ Error ${r.status} — check API key & Project ID.`});}
    }catch{setSt({e:true,t:"❌ Network error. Check your Project ID."});}
    setBusy(false);
  }

  const RULES=`// Firestore Security Rules (Firebase Console → Firestore → Rules)
rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /fpa_reports/{doc} {
      allow read, write: if true; // Replace with auth rule in production
    }
  }
}`;

  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:9999,
    display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>

            <div style={{fontWeight:700,fontSize:"14px",color:"white"}}>Connect Firebase Firestore</div>

          </div>
        </div>
        <button onClick={onClose} style={{background:"transparent",border:"none",color:T.sub,cursor:"pointer",fontSize:"22px",lineHeight:1}}>×</button>
      </div>

      {/* Steps */}
      <div style={{background:T.bg,border:`1px solid ${T.brd}`,borderRadius:"8px",
        padding:"12px 14px",marginBottom:"14px",fontSize:"11px",color:T.sub,lineHeight:"1.9"}}>

        <strong style={{color:T.txt}}>4.</strong> Left menu → <strong style={{color:T.txt}}>Project Settings</strong> (gear icon) → copy <strong style={{color:T.txt}}>Project ID</strong><br/>

    </div>
  </div>;

       "NTC NC","NTC Comp","NTCV NC","NTCV Comp","Abate NC","Abate Comp","Total Comp",
       "Closure","Cl Fail Abate","Cl Fail Pay","Total Cl","Overall Insp","Overall Comp","Total NC"]];
    rows.push(["Iligan City",d[fk].newApps,d[fk].renewalApps,d[fk].totalApps,d[fk].structural,
      ...OCC_FX.map(o=>d[fk].occupancy?.[o.key]||0),
      d[fk].totalInspected,d[fk].fsicNewWithin,d[fk].fsicNewNotWithin,
      d[fk].fsicRenewWithin,d[fk].fsicRenewNotWithin,d[fk].totalFsic,
      d[fk].ntcNonCompliant,d[fk].ntcCompliant,d[fk].ntcvNonCompliant,d[fk].ntcvCompliant,
      d[fk].abatementNonCompliant,d[fk].abatementCompliant,d[fk].totalCompliant,d[fk].closureOrder,
      d[fk].closureFailAbatement,d[fk].closureFailPay,d[fk].totalClosure,
      d[fk].overallInspected,d[fk].overallCompliant,d[fk].totalNonCompliant]);
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),sname);
  };
  fxSht("f2","FORM 2/5 — BUSINESS OPERATIONS","F2_For Business Operations");
  fxSht("f3","FORM 6 — PEZA ESTABLISHMENTS","F3_For PEZA Establishments");
  fxSht("f4","FORM 4/5 — GOVERNMENT BUILDINGS","F4_For Government Buildings");

  const f5r=[
    ["SUMMARY ACCOMPLISHMENT REPORT ON FIRE CODE FEES COLLECTION"],[label],["","FORM 5/5"],
    ["City/Municipality",...F5_FEES.map(f=>`${f.code} — ${f.label}`),"Total"],
  ];
  const fees=F5_FEES.map(f=>Number(d.f5?.[f.key])||0);
  f5r.push(["Iligan City",...fees,fees.reduce((a,b)=>a+b,0)]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(f5r),"F5_Summary Accomplishment Rep");

  XLSX.writeFile(wb,`FPA_IliganCity_${label.replace(/\s/g,"_")}.xlsx`);
}

/* ══════════════════════════════════════════════════════════════
   STATUS DOT
══════════════════════════════════════════════════════════════ */
function StatusDot({status}){
  const map={connected:{c:T.grn,label:"Firebase Live"},connecting:{c:T.amb,label:"Connecting…"},
    disconnected:{c:T.muted,label:"No DB"},error:{c:T.red,label:"DB Error"}};
  const {c,label}=map[status]||map.disconnected;
  return <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
    <span style={{width:"7px",height:"7px",borderRadius:"50%",background:c,
      display:"inline-block",...(status==="connecting"?{animation:"pulse 1.5s infinite"}:{})}}/>
    <span style={{fontSize:"10px",color:c,fontFamily:"'JetBrains Mono',monospace"}}>{label}</span>
  </div>;
}

/* ══════════════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════════════ */
function App(){
  const [tab,setTab]=useState("entry");
  const [form,setForm]=useState("F1");
  const [yr,setYr]=useState(new Date().getFullYear());
  const [mo,setMo]=useState(new Date().getMonth()+1);
  const [fd,setFd]=useState(bRec());
  const [fbCfg,setFbCfg]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("bfp_fb")||"null");}catch{return null;}
  });
  const [showModal,setShowModal]=useState(false);
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState(null);
  const [exporting,setExporting]=useState(false);

  const {status,records,save}=useFirebase(fbCfg);

  // Load record for selected period
  useEffect(()=>{
    const rec=records.find(r=>r.year===yr&&r.month===mo);
    if(rec){
      const{id,year,month,updatedAt,...data}=rec;
      setFd({f1:data.f1||bF1(),f2:data.f2||bFx(),f3:data.f3||bFx(),f4:data.f4||bFx(),f5:data.f5||bF5()});
    } else setFd(bRec());
  },[yr,mo,records]);

  function flash(t,err){setMsg({t,err});setTimeout(()=>setMsg(null),3500);}

  async function handleSave(){
    if(status!=="connected"){flash("❌ Not connected to Firebase. Click 'Connect DB'.",true);return;}
    setSaving(true);
    try{
      await save(yr,mo,fd);
      flash("✅ Saved to Firebase!");
    }catch(e){flash("❌ "+e.message,true);}
    setSaving(false);
  }

  // Offline save to localStorage
  function saveOffline(){
    try{
      const key=`bfp_local_${yr}_${mo}`;
      localStorage.setItem(key,JSON.stringify(fd));
      flash("✅ Saved locally (offline).");
    }catch{flash("❌ Local storage failed.",true);}
  }

  function exportXL(){
    setExporting(true);
    setTimeout(()=>{try{doExport(fd,yr,mo);}catch(e){alert(e.message);}setExporting(false);},80);
  }

  const FORMS=[
    {id:"F1",label:"F1 · New Construction"},
    {id:"F2",label:"F2 · Business Ops"},
    {id:"F3",label:"F3 · PEZA"},
    {id:"F4",label:"F4 · Government"},
    {id:"F5",label:"F5 · Fee Collection"},
  ];
  const isSaved=records.some(r=>r.year===yr&&r.month===mo);

  return <div style={{height:"100vh",display:"flex",flexDirection:"column",background:T.bg}}>
    {/* ── HEADER ── */}
    <header style={{height:"50px",background:"#060c16",borderBottom:`1px solid ${T.brd}`,
      display:"flex",alignItems:"center",padding:"0 16px",gap:"12px",flexShrink:0}}>
      {/* Brand */}
      <div style={{display:"flex",alignItems:"center",gap:"8px",minWidth:"220px"}}>
        <span style={{fontSize:"18px"}}>🔥</span>
        <div>
          <div style={{fontWeight:800,fontSize:"12px",color:"white",letterSpacing:"0.2px"}}>BFP Iligan City</div>
          <div style={{color:T.muted,fontSize:"9px",fontFamily:"'JetBrains Mono',monospace"}}>FPA Report System</div>
        </div>
      </div>

      {/* Tab switcher (centered) */}
      <div style={{flex:1,display:"flex",justifyContent:"center"}}>
        <div style={{display:"flex",gap:"2px",background:T.bg,
          border:`1px solid ${T.brd}`,borderRadius:"8px",padding:"3px"}}>
          {[["entry","📝 Data Entry"],["analytics","📊 Analytics"]].map(([id,lb])=>(
            <button key={id} onClick={()=>setTab(id)}
              style={{padding:"5px 16px",border:"none",borderRadius:"6px",cursor:"pointer",
                fontSize:"11px",fontWeight:700,fontFamily:"'JetBrains Mono',monospace",
                background:tab===id?T.acc:"transparent",color:tab===id?"white":T.sub,
                transition:"all .15s"}}>
              {lb}
            </button>
          ))}
        </div>
      </div>

      {/* Right controls */}
      <div style={{display:"flex",alignItems:"center",gap:"8px",minWidth:"220px",justifyContent:"flex-end"}}>
        <StatusDot status={status}/>
        <button onClick={()=>setShowModal(true)}
          style={{background:"transparent",border:`1px solid ${status==="connected"?T.grn:T.brd}`,
            color:status==="connected"?T.grn:T.sub,borderRadius:"6px",padding:"4px 10px",
            cursor:"pointer",fontSize:"10px",fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>
          {status==="connected"?"⚙ DB":"🔌 Connect DB"}
        </button>
        <button onClick={exportXL} disabled={exporting}
          style={{background:exporting?"#1e293b":"linear-gradient(135deg,#059669,#047857)",
            color:"white",border:"none",borderRadius:"6px",padding:"5px 12px",
            cursor:"pointer",fontSize:"11px",fontWeight:700}}>
          {exporting?"⏳":"⬇"} Excel
        </button>
      </div>
    </header>

    {/* ── BODY ── */}
    {tab==="entry"?(
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        {/* Sidebar */}
        <div style={{width:"205px",minWidth:"205px",background:"#060c16",
          borderRight:`1px solid ${T.brd}`,display:"flex",flexDirection:"column",flexShrink:0}}>
          {/* Period selector */}
          <div style={{padding:"12px",borderBottom:`1px solid ${T.brd}`}}>
            <div style={{fontSize:"9px",color:T.muted,fontFamily:"'JetBrains Mono',monospace",
              letterSpacing:"0.8px",textTransform:"uppercase",marginBottom:"7px"}}>📅 Report Period</div>
            <select value={yr} onChange={e=>setYr(Number(e.target.value))}
              style={{width:"100%",background:T.bg,border:`1px solid ${T.brd}`,color:T.txt,
                padding:"5px 8px",borderRadius:"5px",fontSize:"11px",
                fontFamily:"'JetBrains Mono',monospace",marginBottom:"5px"}}>
              {[2023,2024,2025,2026,2027].map(y=><option key={y} value={y}>{y}</option>)}
            </select>
            <select value={mo} onChange={e=>setMo(Number(e.target.value))}
              style={{width:"100%",background:T.bg,border:`1px solid ${T.brd}`,color:T.txt,
                padding:"5px 8px",borderRadius:"5px",fontSize:"11px",fontFamily:"'JetBrains Mono',monospace"}}>
              {MONTHS.map((m,i)=><option key={i+1} value={i+1}>{m}</option>)}
            </select>
          </div>

          {/* Form nav */}
          <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
            <div style={{padding:"5px 12px",fontSize:"9px",color:T.muted,letterSpacing:"0.8px",
              fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:"2px"}}>Forms</div>
            {FORMS.map(f=>(
              <div key={f.id} onClick={()=>setForm(f.id)}
                style={{padding:"8px 12px",cursor:"pointer",fontSize:"11px",
                  fontFamily:"'JetBrains Mono',monospace",
                  color:form===f.id?"white":T.sub,
                  background:form===f.id?"rgba(59,130,246,.2)":"transparent",
                  borderLeft:form===f.id?`3px solid ${T.acc}`:"3px solid transparent",
                  transition:"all .1s"}}>
                {f.label}
              </div>
            ))}
          </div>

          {/* Save buttons */}
          <div style={{padding:"10px",borderTop:`1px solid ${T.brd}`,display:"flex",flexDirection:"column",gap:"5px"}}>
            {msg&&<div style={{padding:"6px 8px",borderRadius:"5px",fontSize:"10px",
              textAlign:"center",fontFamily:"'JetBrains Mono',monospace",lineHeight:"1.4",
              background:msg.err?"rgba(239,68,68,.15)":"rgba(16,185,129,.15)",
              color:msg.err?T.red:T.grn}}>{msg.t}</div>}
            <button onClick={handleSave} disabled={saving}
              style={{background:saving?"#1e293b":`linear-gradient(135deg,${T.acc},${T.accDk})`,
                color:"white",border:"none",borderRadius:"7px",padding:"9px",
                cursor:saving?"default":"pointer",fontSize:"11px",fontWeight:800,
                fontFamily:"'JetBrains Mono',monospace"}}>
              {saving?"🔄 Saving…":"💾 Save to Firebase"}
            </button>
            <button onClick={saveOffline}
              style={{background:"transparent",color:T.muted,border:`1px solid ${T.brd}`,
                borderRadius:"6px",padding:"5px",cursor:"pointer",
                fontSize:"10px",fontFamily:"'JetBrains Mono',monospace"}}>
              Save Locally (offline)
            </button>
          </div>
        </div>

        {/* Form area */}
        <div style={{flex:1,overflowY:"auto",padding:"14px"}}>
          {/* Breadcrumb */}
          <div style={{marginBottom:"10px",background:"#060c16",borderRadius:"7px",
            padding:"7px 12px",border:`1px solid ${T.brd}`,
            display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
            <span style={{fontSize:"12px"}}>📍</span>
            <span style={{fontWeight:800,color:"white",fontSize:"12px"}}>Iligan City</span>
            <span style={{color:T.muted,fontSize:"11px",fontFamily:"'JetBrains Mono',monospace"}}>
              — {MONTHS[mo-1]} {yr} — {FORMS.find(f=>f.id===form)?.label}
            </span>
            {isSaved&&<span style={{marginLeft:"auto",fontSize:"9px",color:T.grn,
              background:"rgba(16,185,129,.12)",border:`1px solid ${T.grn}`,
              borderRadius:"4px",padding:"2px 6px",fontFamily:"'JetBrains Mono',monospace"}}>
              ● SAVED IN FIREBASE
            </span>}
          </div>

          {form==="F1"&&<F1Form data={fd.f1} onChange={v=>setFd(p=>({...p,f1:v}))}/>}
          {form==="F2"&&<InspForm data={fd.f2} onChange={v=>setFd(p=>({...p,f2:v}))}/>}
          {form==="F3"&&<InspForm data={fd.f3} onChange={v=>setFd(p=>({...p,f3:v}))}/>}
          {form==="F4"&&<InspForm data={fd.f4} onChange={v=>setFd(p=>({...p,f4:v}))}/>}
          {form==="F5"&&<F5Form data={fd.f5} onChange={v=>setFd(p=>({...p,f5:v}))}/>}
        </div>
      </div>
    ):(
      <div style={{flex:1,overflowY:"auto",padding:"14px"}}>
        <Analytics records={records}/>
      </div>
    )}

    {showModal&&(
      <FirebaseModal saved={fbCfg} onClose={()=>setShowModal(false)}
        onSave={cfg=>{
          setFbCfg(cfg);
          try{localStorage.setItem("bfp_fb",JSON.stringify(cfg));}catch{}
          setShowModal(false);
        }}/>
    )}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

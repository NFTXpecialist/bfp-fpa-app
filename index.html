/* ══════════════════════════════════════════════════════
   BLANK DATA FACTORIES
══════════════════════════════════════════════════════ */
const bF1=()=>{

  return{fsecAppReceived:0,fsecWithin:0,fsecNotWithin:0,totalFsec:0,nod:0,occupancy:o,

};
const bFx=()=>{

  return{newApps:0,renewalApps:0,totalApps:0,structural:0,occupancy:o,
    totalInspected:0,fsicNewWithin:0,fsicNewNotWithin:0,fsicRenewWithin:0,fsicRenewNotWithin:0,
    totalFsic:0,ntcNonCompliant:0,ntcCompliant:0,ntcvNonCompliant:0,ntcvCompliant:0,
    abatementNonCompliant:0,abatementCompliant:0,totalCompliant:0,closureOrder:0,
    closureFailAbatement:0,closureFailPay:0,totalClosure:0,

};
const bF5=()=>{const d={};F5_FEES.forEach(f=>{d[f.key]=0});return d;};

/* ══════════════════════════════════════════════════════
   SUPABASE CLIENT  (plain fetch, no SDK)
══════════════════════════════════════════════════════ */
class SB{
  constructor(url,key){
    this.url=url.replace(/\/$/,"");
    this.key=key;
  }
  _h(extra={}){
    return{
      "apikey":this.key,
      "Authorization":`Bearer ${this.key}`,
      "Content-Type":"application/json",
      ...extra
    };
  }
  async getAll(){
    const r=await fetch(
      `${this.url}/rest/v1/fpa_reports?select=*&order=year.asc,month.asc`,
      {headers:this._h()}
    );
    if(!r.ok) throw new Error(`Supabase fetch failed: ${r.status}`);
    return r.json();
  }
  async upsert(year,month,data){
    const r=await fetch(
      `${this.url}/rest/v1/fpa_reports`,
      {
        method:"POST",
        headers:this._h({"Prefer":"resolution=merge-duplicates,return=representation"}),
        body:JSON.stringify({year,month,data,updated_at:new Date().toISOString()})
      }
    );
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  }
  async ping(){
    const r=await fetch(
      `${this.url}/rest/v1/fpa_reports?select=id&limit=1`,
      {headers:this._h()}
    );
    return r.status;
  }
}

/* ══════════════════════════════════════════════════════
   AGGREGATE RECORDS
══════════════════════════════════════════════════════ */
function sumRecs(recs){
  if(!recs||!recs.length) return null;
  const m={f1:bF1(),f2:bFx(),f3:bFx(),f4:bFx(),f5:bF5()};
  recs.forEach(rec=>{
    const d=rec.data||rec;
    // F1 numerics
    ["fsecAppReceived","fsecWithin","fsecNotWithin","totalFsec","nod",
     "overallNC","overallRN","overallTotal","inspectionUnderConstruction",
     "fsicWithin","fsicNotWithin","totalFsicOccupancy","ntcNod"
    ].forEach(k=>{m.f1[k]+=(d.f1?.[k]||0);});
    OCC_NC.forEach(o=>{
      m.f1.occupancy[o.key].nc+=(d.f1?.occupancy?.[o.key]?.nc||0);
      m.f1.occupancy[o.key].rn+=(d.f1?.occupancy?.[o.key]?.rn||0);
    });
    // F2/F3/F4
    const fxk=["newApps","renewalApps","totalApps","structural","totalInspected",
      "fsicNewWithin","fsicNewNotWithin","fsicRenewWithin","fsicRenewNotWithin","totalFsic",
      "ntcNonCompliant","ntcCompliant","ntcvNonCompliant","ntcvCompliant",
      "abatementNonCompliant","abatementCompliant","totalCompliant","closureOrder",
      "closureFailAbatement","closureFailPay","totalClosure",
      "overallInspected","overallCompliant","totalNonCompliant"];
    ["f2","f3","f4"].forEach(fn=>{
      fxk.forEach(k=>{m[fn][k]+=(d[fn]?.[k]||0);});
      OCC_FX.forEach(o=>{m[fn].occupancy[o.key]+=(d[fn]?.occupancy?.[o.key]||0);});
    });
    // F5
    F5_FEES.forEach(f=>{m.f5[f.key]+=(d.f5?.[f.key]||0);});
  });
  return m;
}

/* ══════════════════════════════════════════════════════
   UI ATOMS
══════════════════════════════════════════════════════ */
function NumInput({value,onChange,small}){
  return(
    <input type="number" min="0" value={value}
      onChange={e=>onChange(Number(e.target.value)||0)}
      onFocus={e=>e.target.style.borderColor=T.acc}
      onBlur={e=>e.target.style.borderColor=T.brd}
      style={{width:small?"58px":"76px",padding:"4px 5px",fontSize:"12px",
        background:T.bg,border:`1px solid ${T.brd}`,borderRadius:"5px",
        color:T.txt,textAlign:"center",fontFamily:"'JetBrains Mono',monospace",
        transition:"border-color .15s"}}/>
  );
}
function Card({children,style}){
  return(
    <div style={{background:T.surf,border:`1px solid ${T.brd}`,borderRadius:"8px",
      marginBottom:"10px",overflow:"hidden",...style}}>
      {children}
    </div>
  );
}
function SHdr({children,color}){
  return(
    <div style={{background:color||`linear-gradient(90deg,${T.accDk},${T.surf2})`,
      color:"white",padding:"9px 14px",fontFamily:"'JetBrains Mono',monospace",
      fontSize:"10px",fontWeight:"600",letterSpacing:"0.8px",textTransform:"uppercase",
      display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      {children}
    </div>
  );
}
function FR({label,children}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px",flexWrap:"wrap"}}>
      <span style={{fontSize:"11px",color:T.sub,minWidth:"195px",
        fontFamily:"'JetBrains Mono',monospace",lineHeight:"1.3"}}>{label}</span>
      {children}
    </div>
  );
}

const TDC={...TD,textAlign:"center"};

                    fontSize:"9px",padding:"2px 7px",borderRadius:"4px",
                    whiteSpace:"nowrap",minWidth:"100px",textAlign:"center"}}>{f.code}</span>
                  <span style={{flex:1,fontSize:"11px",color:T.sub}}>{f.label}</span>
                  <NumInput value={data[f.key]||0} onChange={v=>u(f.key,v)}/>
                </div>
              ))}
            </div>
          </Card>
        );
      })}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   CHART WRAPPER
══════════════════════════════════════════════════════ */
function ChartBox({type,data,opts,h}){
  const ref=useRef();const inst=useRef();
  const key=JSON.stringify(data);
  useEffect(()=>{
    if(inst.current){inst.current.destroy();inst.current=null;}
    if(!ref.current||!data) return;
    inst.current=new Chart(ref.current,{
      type,data,
      options:{responsive:true,maintainAspectRatio:false,animation:{duration:350},...opts}
    });
    return()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },[key]);
  return <div style={{height:h||210,position:"relative"}}><canvas ref={ref}/></div>;
}
const CO={
  plugins:{legend:{labels:{color:T.sub,font:{family:"Inter",size:10},boxWidth:10,padding:8}}},
  scales:{
    x:{ticks:{color:T.muted,font:{size:9}},grid:{color:"rgba(255,255,255,.04)"}},
    y:{ticks:{color:T.muted,font:{size:9}},grid:{color:"rgba(255,255,255,.04)"}},
  }
};
const CO_HB={...CO,indexAxis:"y",
  scales:{

/* ══════════════════════════════════════════════════════
   ANALYTICS TAB
══════════════════════════════════════════════════════ */
function Analytics({records}){
  const [period,setPeriod]=useState("monthly");
  const [yr,setYr]=useState(new Date().getFullYear());

  const years=useMemo(()=>{
    const s=new Set(records.map(r=>r.year));
    s.add(new Date().getFullYear());
    return[...s].sort((a,b)=>a-b);
  },[records]);

  const yrRecs=useMemo(()=>records.filter(r=>r.year===yr),[records,yr]);

  // Unpack helper — records from Supabase store form data inside .data field
  const unpack=r=>({year:r.year,month:r.month,...(r.data||r)});

  function makeGroups(){
    const unpacked=yrRecs.map(unpack);
    if(period==="monthly") return MONTHS.map((mn,i)=>{
      const found=unpacked.filter(r=>r.month===i+1);
      return{label:mn.slice(0,3),r:sumRecs(found)};
    });
    if(period==="quarterly") return[1,2,3,4].map(q=>({
      label:`Q${q}`,r:sumRecs(unpacked.filter(r=>Math.ceil(r.month/3)===q))
    }));
    if(period==="semester") return[
      {label:"Jan–Jun",r:sumRecs(unpacked.filter(r=>r.month<=6))},
      {label:"Jul–Dec",r:sumRecs(unpacked.filter(r=>r.month>6))},
    ];
    return[{label:String(yr),r:sumRecs(unpacked)}];
  }

  const G=makeGroups();
  const L=G.map(g=>g.label);
  const feeTotal=r=>r?F5_FEES.reduce((s,f)=>s+(r.f5?.[f.key]||0),0):0;

  const fsecD=G.map(g=>g.r?.f1?.totalFsec||0);
  const fsicD=G.map(g=>g.r?.f1?.totalFsicOccupancy||0);
  const bizInsp=G.map(g=>g.r?.f2?.overallInspected||0);
  const bizComp=G.map(g=>g.r?.f2?.overallCompliant||0);
  const bizNonC=G.map(g=>g.r?.f2?.totalNonCompliant||0);
  const feeTD=G.map(g=>feeTotal(g.r));
  const fsifD=G.map(g=>(g.r?.f5?.fsifOccupancy||0)+(g.r?.f5?.fsifBusiness||0));
  const taxD=G.map(g=>["constructionTax","realtyTax","premiumTax","salesTax","proceedsTax"].reduce((s,k)=>s+(g.r?.f5?.[k]||0),0));
  const closures=G.map(g=>(g.r?.f2?.totalClosure||0)+(g.r?.f3?.totalClosure||0)+(g.r?.f4?.totalClosure||0));

  const M=sumRecs(yrRecs.map(unpack))||bRec();
  const occNC=OCC_NC.map(o=>M.f1.occupancy[o.key].nc);
  const occRN=OCC_NC.map(o=>M.f1.occupancy[o.key].rn);
  const occBiz=OCC_FX.map(o=>M.f2.occupancy[o.key]||0);

  const totFsec=fsecD.reduce((a,b)=>a+b,0);
  const totFsic=fsicD.reduce((a,b)=>a+b,0);
  const totInsp=bizInsp.reduce((a,b)=>a+b,0);
  const totFees=feeTD.reduce((a,b)=>a+b,0);
  const totClose=closures.reduce((a,b)=>a+b,0);

  const kpis=[
    {icon:"📋",val:totFsec,label:"Total FSEC Issued",color:T.acc},
    {icon:"✅",val:totFsic,label:"Total FSIC (Occupancy)",color:T.grn},
    {icon:"🔍",val:totInsp,label:"Business Inspections",color:T.pur},
    {icon:"💰",val:`₱${totFees.toLocaleString()}`,label:"Total Fees Collected",color:T.amb},
    {icon:"🔒",val:totClose,label:"Total Closure Orders",color:T.red},
  ];

  return(
    <div className="fade">
      {/* Controls */}
      <div style={{display:"flex",gap:"8px",marginBottom:"14px",flexWrap:"wrap",alignItems:"center"}}>
        <select value={yr} onChange={e=>setYr(Number(e.target.value))}
          style={{background:T.bg,border:`1px solid ${T.brd}`,color:T.txt,
            padding:"6px 10px",borderRadius:"6px",fontSize:"12px",
            fontFamily:"'JetBrains Mono',monospace"}}>
          {years.map(y=><option key={y} value={y}>{y}</option>)}
        </select>
        <div style={{display:"flex",gap:"3px",background:T.bg,
          border:`1px solid ${T.brd}`,borderRadius:"7px",padding:"3px"}}>
          {["monthly","quarterly","semester","annual"].map(p=>(
            <button key={p} onClick={()=>setPeriod(p)}
              style={{padding:"5px 12px",border:"none",borderRadius:"5px",cursor:"pointer",
                fontSize:"11px",fontFamily:"'JetBrains Mono',monospace",fontWeight:"600",
                background:period===p?T.acc:"transparent",
                color:period===p?"white":T.sub,transition:"all .15s"}}>
              {p.charAt(0).toUpperCase()+p.slice(1)}
            </button>
          ))}
        </div>
        {!records.length&&(
          <span style={{color:T.amb,fontSize:"11px",fontFamily:"'JetBrains Mono',monospace"}}>
            ⚠ No saved data yet — save monthly reports to populate analytics.
          </span>
        )}
      </div>

      {/* KPI Strip */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"8px",marginBottom:"12px"}}>
        {kpis.map(k=>(
          <div key={k.label} style={{background:T.surf,border:`1px solid ${T.brd}`,
            borderRadius:"8px",padding:"10px 12px",borderTop:`3px solid ${k.color}`}}>
            <div style={{fontSize:"16px",marginBottom:"4px"}}>{k.icon}</div>
            <div style={{color:k.color,fontFamily:"'JetBrains Mono',monospace",
              fontSize:"18px",fontWeight:"800"}}>
              {typeof k.val==="number"?k.val.toLocaleString():k.val}
            </div>
            <div style={{color:T.muted,fontSize:"9px",marginTop:"2px",lineHeight:"1.3"}}>{k.label}</div>
          </div>
        ))}
      </div>

      {/* Row 1 — FSEC/FSIC + Business compliance */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"10px"}}>
        <Card>
          <SHdr>FSEC & FSIC Issuances</SHdr>
          <div style={{padding:"12px"}}>
            <ChartBox type="bar" data={{labels:L,datasets:[
              {label:"FSEC Issued",data:fsecD,backgroundColor:"rgba(59,130,246,.75)",borderColor:T.acc,borderWidth:1,borderRadius:3},
              {label:"FSIC Occupancy",data:fsicD,backgroundColor:"rgba(16,185,129,.75)",borderColor:T.grn,borderWidth:1,borderRadius:3},
            ]}} opts={CO}/>
          </div>
        </Card>
        <Card>
          <SHdr>Business Inspections — Compliant vs Non-Compliant</SHdr>
          <div style={{padding:"12px"}}>
            <ChartBox type="bar" data={{labels:L,datasets:[
              {label:"Total Inspected",data:bizInsp,backgroundColor:"rgba(139,92,246,.6)",borderColor:T.pur,borderWidth:1,borderRadius:3},
              {label:"Compliant",data:bizComp,backgroundColor:"rgba(16,185,129,.75)",borderColor:T.grn,borderWidth:1,borderRadius:3},
              {label:"Non-Compliant",data:bizNonC,backgroundColor:"rgba(239,68,68,.65)",borderColor:T.red,borderWidth:1,borderRadius:3},
            ]}} opts={CO}/>
          </div>
        </Card>
      </div>

      {/* Row 2 — Fee trend + Closures */}
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:"10px",marginBottom:"10px"}}>
        <Card>
          <SHdr>Fee Collection Trend (F5)</SHdr>
          <div style={{padding:"12px"}}>
            <ChartBox type="line" data={{labels:L,datasets:[
              {label:"Total Fees",data:feeTD,borderColor:T.amb,backgroundColor:"rgba(245,158,11,.12)",tension:.4,fill:true,pointRadius:4},
              {label:"FSIF",data:fsifD,borderColor:T.acc,tension:.4,fill:false,pointRadius:3},
              {label:"Fire Code Tax",data:taxD,borderColor:T.red,tension:.4,fill:false,pointRadius:3},
            ]}} opts={CO}/>
          </div>
        </Card>
        <Card>
          <SHdr>Closure Orders</SHdr>
          <div style={{padding:"12px"}}>
            <ChartBox type="bar" data={{labels:L,datasets:[
              {label:"Closures",data:closures,backgroundColor:"rgba(239,68,68,.7)",borderColor:T.red,borderWidth:1,borderRadius:3},
            ]}} opts={{...CO,plugins:{legend:{display:false}}}}/>
          </div>
        </Card>
      </div>

      {/* Row 3 — Occupancy NC/RN + Business by occupancy */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"10px"}}>
        <Card>
          <SHdr>New Construction — Occupancy NC vs RN ({yr} total)</SHdr>
          <div style={{padding:"12px"}}>
            <ChartBox type="bar" h={260} data={{
              labels:OCC_NC.map(o=>o.label),
              datasets:[
                {label:"NC (New)",data:occNC,backgroundColor:"rgba(59,130,246,.75)"},
                {label:"RN (Renovation)",data:occRN,backgroundColor:"rgba(139,92,246,.75)"},
              ]}} opts={CO_HB}/>
          </div>
        </Card>
        <Card>
          <SHdr>Business Inspections — By Occupancy Type ({yr} total)</SHdr>
          <div style={{padding:"12px"}}>
            <ChartBox type="bar" h={260} data={{
              labels:OCC_FX.map(o=>o.label),
              datasets:[{label:"Inspected",data:occBiz,backgroundColor:"rgba(245,158,11,.75)"}]
            }} opts={{...CO_HB,plugins:{legend:{display:false}}}}/>
          </div>
        </Card>
      </div>

      {/* Row 4 — Fee doughnut + Monthly summary table */}
      <div style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:"10px"}}>
        <Card>
          <SHdr>Fee Categories — {yr}</SHdr>
          <div style={{padding:"12px",height:"240px",display:"flex",justifyContent:"center"}}>
            <ChartBox type="doughnut" h={216} data={{
              labels:["Fire Code Tax","FSIF","Clearance","Installation","Other","COC"],
              datasets:[{data:[
                ["constructionTax","realtyTax","premiumTax","salesTax","proceedsTax"].reduce((s,k)=>s+(M.f5[k]||0),0),
                (M.f5.fsifOccupancy||0)+(M.f5.fsifBusiness||0),
                (M.f5.storageClearance||0)+(M.f5.conveyanceClearance||0),
                ["installBuildingService","installAFSS","installFDAS","installKHSS",
                 "installFlammable","installLPGas","otherInstall"].reduce((s,k)=>s+(M.f5[k]||0),0),
                F5_FEES.filter(f=>f.group==="Other Fees").reduce((s,f)=>s+(M.f5[f.key]||0),0),
                M.f5.cocFees||0,
              ],backgroundColor:[T.acc,T.grn,T.pur,T.amb,T.red,T.cyn],
              borderColor:T.bg,borderWidth:2}]

              plugins:{legend:{position:"bottom",labels:{color:T.sub,font:{size:9},boxWidth:10,padding:5}}}}}/>
          </div>
        </Card>
        <Card>
          <SHdr>Monthly Summary Table — {yr}</SHdr>
          <div style={{padding:"10px",overflowX:"auto"}}>
            <table style={{borderCollapse:"collapse",width:"100%",fontSize:"11px"}}>
              <thead><tr>
                {["Month","FSEC","FSIC Occ.","Biz Apps","Biz Insp.","Compliant","Non-Comp","Closures","Fees ₱"].map(h=>(
                  <th key={h} style={TH}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{MONTHS.map((mn,i)=>{
                const raw=yrRecs.find(x=>x.month===i+1);
                const r=raw?unpack(raw):null;
                const fees=r?F5_FEES.reduce((s,f)=>s+(r.f5?.[f.key]||0),0):null;
                const cl=r?(r.f2?.totalClosure||0)+(r.f3?.totalClosure||0)+(r.f4?.totalClosure||0):null;
                const D=<span style={{color:T.muted}}>—</span>;
                return(
                  <tr key={mn} style={{background:i%2===0?T.bg:"transparent"}}>
                    <td style={{...TD,fontWeight:r?"600":"400"}}>
                      {mn.slice(0,3)}
                      {r&&<span style={{color:T.grn,marginLeft:"4px",fontSize:"8px"}}>●</span>}
                    </td>
                    <td style={TDC}>{r?.f1?.totalFsec??D}</td>
                    <td style={TDC}>{r?.f1?.totalFsicOccupancy??D}</td>
                    <td style={TDC}>{r?.f2?.totalApps??D}</td>
                    <td style={TDC}>{r?.f2?.overallInspected??D}</td>
                    <td style={{...TDC,color:r?T.grn:T.muted}}>{r?.f2?.overallCompliant??D}</td>
                    <td style={{...TDC,color:r&&(r.f2?.totalNonCompliant||0)>0?T.red:T.muted}}>{r?.f2?.totalNonCompliant??D}</td>
                    <td style={{...TDC,color:cl>0?T.red:T.muted}}>{cl??D}</td>
                    <td style={{...TDC,color:fees?T.grn:T.muted}}>
                      {fees!=null?`₱${fees.toLocaleString()}`:D}
                    </td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        </Card>
      </div>
    </div>
  );
}

      "Closure","Cl Fail Abate","Cl Fail Pay","Total Cl","Overall Insp","Overall Comp","Total NC"]];
    rows.push(["Iligan City",d[fk].newApps,d[fk].renewalApps,d[fk].totalApps,d[fk].structural,
      ...OCC_FX.map(o=>d[fk].occupancy?.[o.key]||0),
      d[fk].totalInspected,d[fk].fsicNewWithin,d[fk].fsicNewNotWithin,
      d[fk].fsicRenewWithin,d[fk].fsicRenewNotWithin,d[fk].totalFsic,
      d[fk].ntcNonCompliant,d[fk].ntcCompliant,d[fk].ntcvNonCompliant,d[fk].ntcvCompliant,
      d[fk].abatementNonCompliant,d[fk].abatementCompliant,d[fk].totalCompliant,d[fk].closureOrder,
      d[fk].closureFailAbatement,d[fk].closureFailPay,d[fk].totalClosure,
      d[fk].overallInspected,d[fk].overallCompliant,d[fk].totalNonCompliant]);
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),sname);
  };
  fxSht("f2","FORM 2/5 — BUSINESS OPERATIONS","F2_For Business Operations");
  fxSht("f3","FORM 6 — PEZA ESTABLISHMENTS","F3_For PEZA Establishments");
  fxSht("f4","FORM 4/5 — GOVERNMENT BUILDINGS","F4_For Government Buildings");

  const f5r=[
    ["SUMMARY ACCOMPLISHMENT REPORT ON FIRE CODE FEES COLLECTION"],[label],["","FORM 5/5"],
    ["City/Municipality",...F5_FEES.map(f=>`${f.code} — ${f.label}`),"Total"],
  ];
  const fees=F5_FEES.map(f=>Number(d.f5?.[f.key])||0);
  f5r.push(["Iligan City",...fees,fees.reduce((a,b)=>a+b,0)]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(f5r),"F5_Summary Accomplishment Rep");

  XLSX.writeFile(wb,`FPA_IliganCity_${label.replace(/\s/g,"_")}.xlsx`);
}

/* ══════════════════════════════════════════════════════
   DB STATUS DOT
══════════════════════════════════════════════════════ */
function StatusDot({ok}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
      <span style={{width:"7px",height:"7px",borderRadius:"50%",
        background:ok?T.grn:T.muted,display:"inline-block"}}/>
      <span style={{fontSize:"10px",color:ok?T.grn:T.sub,
        fontFamily:"'JetBrains Mono',monospace"}}>
        {ok?"Supabase Connected":"No DB"}
      </span>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════ */
function App(){
  const [tab,setTab]=useState("entry");
  const [form,setForm]=useState("F1");
  const [yr,setYr]=useState(new Date().getFullYear());
  const [mo,setMo]=useState(new Date().getMonth()+1);
  const [fd,setFd]=useState(bRec());
  const [records,setRecords]=useState([]);
  const [dbCfg,setDbCfg]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("bfp_sb")||"null");}catch{return null;}
  });
  const [showModal,setShowModal]=useState(false);
  const [saving,setSaving]=useState(false);
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState(null);
  const [exporting,setExporting]=useState(false);

  const sb=useMemo(()=>dbCfg?.url&&dbCfg?.key?new SB(dbCfg.url,dbCfg.key):null,[dbCfg]);

  // Load all records on connect
  useEffect(()=>{
    if(!sb) return;
    setLoading(true);
    sb.getAll()
      .then(rows=>setRecords(rows||[]))
      .catch(()=>{})
      .finally(()=>setLoading(false));
  },[sb]);

  // Sync form data when period changes
  useEffect(()=>{
    const raw=records.find(r=>r.year===yr&&r.month===mo);
    if(raw){
      const d=raw.data||raw;
      setFd({
        f1:d.f1||bF1(),f2:d.f2||bFx(),
        f3:d.f3||bFx(),f4:d.f4||bFx(),f5:d.f5||bF5()
      });
    } else setFd(bRec());
  },[yr,mo,records]);

  function flash(t,err){setMsg({t,err});setTimeout(()=>setMsg(null),3500);}

  async function handleSave(){
    if(!sb){flash("❌ Not connected to Supabase. Click 'Connect DB'.",true);return;}
    setSaving(true);
    try{
      await sb.upsert(yr,mo,fd);
      const rows=await sb.getAll();
      setRecords(rows||[]);
      flash("✅ Saved to Supabase!");
    }catch(e){flash("❌ "+e.message,true);}
    setSaving(false);
  }

  function saveOffline(){
    try{
      localStorage.setItem(`bfp_offline_${yr}_${mo}`,JSON.stringify(fd));
      flash("✅ Saved locally (offline backup).");
    }catch{flash("❌ Local storage failed.",true);}
  }

  function exportXL(){
    setExporting(true);
    setTimeout(()=>{try{doExport(fd,yr,mo);}catch(e){alert(e.message);}setExporting(false);},80);
  }

  const FORMS=[
    {id:"F1",label:"F1 · New Construction"},
    {id:"F2",label:"F2 · Business Ops"},
    {id:"F3",label:"F3 · PEZA"},
    {id:"F4",label:"F4 · Government"},
    {id:"F5",label:"F5 · Fee Collection"},
  ];
  const isSaved=records.some(r=>r.year===yr&&r.month===mo);

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:T.bg,overflow:"hidden"}}>

      {/* ── HEADER ── */}
      <header style={{height:"50px",background:"#05090f",borderBottom:`1px solid ${T.brd}`,
        display:"flex",alignItems:"center",padding:"0 16px",gap:"12px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:"8px",minWidth:"200px"}}>
          <span style={{fontSize:"20px"}}>🔥</span>
          <div>
            <div style={{fontWeight:"800",fontSize:"12px",color:"white"}}>BFP Iligan City</div>
            <div style={{color:T.muted,fontSize:"9px",fontFamily:"'JetBrains Mono',monospace"}}>
              FPA Report System
            </div>
          </div>
        </div>

        {/* Tab switcher */}
        <div style={{flex:1,display:"flex",justifyContent:"center"}}>
          <div style={{display:"flex",gap:"2px",background:T.bg,
            border:`1px solid ${T.brd}`,borderRadius:"8px",padding:"3px"}}>
            {[["entry","📝 Data Entry"],["analytics","📊 Analytics"]].map(([id,lb])=>(
              <button key={id} onClick={()=>setTab(id)}
                style={{padding:"5px 16px",border:"none",borderRadius:"6px",cursor:"pointer",
                  fontSize:"11px",fontWeight:"700",fontFamily:"'JetBrains Mono',monospace",
                  background:tab===id?T.acc:"transparent",
                  color:tab===id?"white":T.sub,transition:"all .15s"}}>
                {lb}
              </button>
            ))}
          </div>
        </div>

        {/* Right controls */}
        <div style={{display:"flex",alignItems:"center",gap:"8px",minWidth:"200px",justifyContent:"flex-end"}}>
          <StatusDot ok={!!sb}/>
          <button onClick={()=>setShowModal(true)}
            style={{background:"transparent",border:`1px solid ${sb?T.grn:T.brd}`,
              color:sb?T.grn:T.sub,borderRadius:"6px",padding:"4px 10px",cursor:"pointer",
              fontSize:"10px",fontFamily:"'JetBrains Mono',monospace",fontWeight:"600"}}>
            {sb?"⚙ DB Settings":"🔌 Connect DB"}
          </button>
          <button onClick={exportXL} disabled={exporting}
            style={{background:exporting?"#1e293b":"linear-gradient(135deg,#059669,#047857)",
              color:"white",border:"none",borderRadius:"6px",padding:"5px 12px",
              cursor:"pointer",fontSize:"11px",fontWeight:"700"}}>
            {exporting?"⏳":"⬇"} Excel
          </button>
        </div>
      </header>

      {/* ── BODY ── */}
      {tab==="entry"?(
        <div style={{display:"flex",flex:1,overflow:"hidden"}}>

          {/* Sidebar */}
          <div style={{width:"205px",minWidth:"205px",background:"#05090f",
            borderRight:`1px solid ${T.brd}`,display:"flex",flexDirection:"column",flexShrink:0}}>

            {/* Period picker */}
            <div style={{padding:"12px",borderBottom:`1px solid ${T.brd}`}}>
              <div style={{fontSize:"9px",color:T.muted,fontFamily:"'JetBrains Mono',monospace",
                letterSpacing:"0.8px",textTransform:"uppercase",marginBottom:"7px"}}>
                📅 Report Period
              </div>
              <select value={yr} onChange={e=>setYr(Number(e.target.value))}
                style={{width:"100%",background:T.bg,border:`1px solid ${T.brd}`,color:T.txt,
                  padding:"5px 8px",borderRadius:"5px",fontSize:"11px",
                  fontFamily:"'JetBrains Mono',monospace",marginBottom:"5px"}}>
                {[2023,2024,2025,2026,2027].map(y=><option key={y} value={y}>{y}</option>)}
              </select>
              <select value={mo} onChange={e=>setMo(Number(e.target.value))}
                style={{width:"100%",background:T.bg,border:`1px solid ${T.brd}`,color:T.txt,
                  padding:"5px 8px",borderRadius:"5px",fontSize:"11px",
                  fontFamily:"'JetBrains Mono',monospace"}}>
                {MONTHS.map((m,i)=><option key={i+1} value={i+1}>{m}</option>)}
              </select>
            </div>

            {/* Form nav */}
            <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
              <div style={{padding:"5px 12px",fontSize:"9px",color:T.muted,letterSpacing:"0.8px",
                fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase",marginBottom:"2px"}}>
                Forms
              </div>
              {FORMS.map(f=>(
                <div key={f.id} onClick={()=>setForm(f.id)}
                  style={{padding:"8px 12px",cursor:"pointer",fontSize:"11px",
                    fontFamily:"'JetBrains Mono',monospace",
                    color:form===f.id?"white":T.sub,
                    background:form===f.id?"rgba(59,130,246,.2)":"transparent",
                    borderLeft:form===f.id?`3px solid ${T.acc}`:"3px solid transparent",
                    transition:"all .1s"}}>
                  {f.label}
                </div>
              ))}
            </div>

            {/* Save panel */}
            <div style={{padding:"10px",borderTop:`1px solid ${T.brd}`,display:"flex",flexDirection:"column",gap:"5px"}}>
              {msg&&(
                <div style={{padding:"6px 8px",borderRadius:"5px",fontSize:"10px",
                  textAlign:"center",fontFamily:"'JetBrains Mono',monospace",lineHeight:"1.4",
                  background:msg.err?"rgba(239,68,68,.15)":"rgba(16,185,129,.15)",
                  color:msg.err?T.red:T.grn}}>
                  {msg.t}
                </div>
              )}
              <button onClick={handleSave} disabled={saving}
                style={{background:saving?"#1e293b":`linear-gradient(135deg,${T.acc},${T.accDk})`,
                  color:"white",border:"none",borderRadius:"7px",padding:"9px",
                  cursor:saving?"default":"pointer",fontSize:"11px",fontWeight:"800",
                  fontFamily:"'JetBrains Mono',monospace"}}>
                {saving?"🔄 Saving…":"💾 Save to Supabase"}
              </button>
              <button onClick={saveOffline}
                style={{background:"transparent",color:T.muted,border:`1px solid ${T.brd}`,
                  borderRadius:"6px",padding:"5px",cursor:"pointer",fontSize:"10px",
                  fontFamily:"'JetBrains Mono',monospace"}}>
                Save Locally (offline)
              </button>
            </div>
          </div>

          {/* Form area */}
          <div style={{flex:1,overflowY:"auto",padding:"14px"}}>
            {loading&&(
              <div style={{textAlign:"center",padding:"40px",color:T.muted,
                fontFamily:"'JetBrains Mono',monospace",fontSize:"12px"}}>
                ⏳ Loading records from Supabase…
              </div>
            )}

            {/* Breadcrumb */}
            <div style={{marginBottom:"10px",background:"#05090f",borderRadius:"7px",
              padding:"7px 12px",border:`1px solid ${T.brd}`,
              display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
              <span style={{fontSize:"12px"}}>📍</span>
              <span style={{fontWeight:"800",color:"white",fontSize:"12px"}}>Iligan City</span>
              <span style={{color:T.muted,fontSize:"11px",fontFamily:"'JetBrains Mono',monospace"}}>
                — {MONTHS[mo-1]} {yr} — {FORMS.find(f=>f.id===form)?.label}
              </span>
              {isSaved&&(
                <span style={{marginLeft:"auto",fontSize:"9px",color:T.grn,
                  background:"rgba(16,185,129,.12)",border:`1px solid ${T.grn}`,
                  borderRadius:"4px",padding:"2px 7px",fontFamily:"'JetBrains Mono',monospace"}}>
                  ● SAVED IN SUPABASE
                </span>
              )}
            </div>

            {form==="F1"&&<F1Form   data={fd.f1} onChange={v=>setFd(p=>({...p,f1:v}))}/>}
            {form==="F2"&&<InspForm data={fd.f2} onChange={v=>setFd(p=>({...p,f2:v}))}/>}
            {form==="F3"&&<InspForm data={fd.f3} onChange={v=>setFd(p=>({...p,f3:v}))}/>}
            {form==="F4"&&<InspForm data={fd.f4} onChange={v=>setFd(p=>({...p,f4:v}))}/>}
            {form==="F5"&&<F5Form   data={fd.f5} onChange={v=>setFd(p=>({...p,f5:v}))}/>}
          </div>
        </div>
      ):(
        <div style={{flex:1,overflowY:"auto",padding:"14px"}}>
          <Analytics records={records}/>
        </div>
      )}

      {showModal&&(
        <DBModal saved={dbCfg} onClose={()=>setShowModal(false)}
          onSave={cfg=>{
            setDbCfg(cfg);
            try{localStorage.setItem("bfp_sb",JSON.stringify(cfg));}catch{}
            setShowModal(false);
          }}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
